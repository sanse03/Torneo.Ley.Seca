<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Ley Seca — Seguimiento</title>
<style>
  :root{
    --green-dark:#145a32;
    --green:#1e8449;
    --green-light:#eafaf1;
    --ink:#15241b;
    --muted:#6b7d72;
    --surface:#ffffff;
    --bg:#f4f8f5;
    --border:#dfe9e2;
    --cuartos:#0e7c66;
    --semis:#4338ca;
    --final:#b45309;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
  header{background:var(--green-dark);color:#fff;padding:18px 16px 14px;position:sticky;top:0;z-index:10;}
  header h1{margin:0;font-size:20px;letter-spacing:.2px;}
  header .sub{font-size:12.5px;opacity:.85;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;}
  .status{font-size:11px;margin-top:6px;opacity:.9;}
  .status.ok{color:#bdf5d3;}
  .status.bad{color:#ffd7d7;}
  nav{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:9;}
  nav button{flex:0 0 auto;border:1px solid var(--border);background:#fff;color:var(--ink);padding:8px 14px;border-radius:999px;font-size:13.5px;font-weight:600;cursor:pointer;}
  nav button.active{background:var(--green);border-color:var(--green);color:#fff;}
  main{max-width:880px;margin:0 auto;padding:16px 12px 60px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 6px;text-align:center;}
  .stat b{display:block;font-size:19px;color:var(--green-dark);}
  .stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
  h2.section{font-size:15px;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
  h2.section .bar{width:4px;height:16px;background:var(--green);border-radius:2px;display:inline-block;}
  .day{font-size:12px;font-weight:700;color:var(--green-dark);background:var(--green-light);padding:6px 10px;border-radius:8px;margin:14px 0 8px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
  .card.new{border:1.5px solid var(--green);box-shadow:0 0 0 3px var(--green-light);}
  .card.pending{opacity:.6;}
  .row-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .pill{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff;}
  .pill.time{background:var(--ink);}
  .pill.court{background:var(--green);}
  .pill.grupos{background:var(--green-dark);}
  .pill.cuartos{background:var(--cuartos);}
  .pill.semis{background:var(--semis);}
  .pill.final{background:var(--final);}
  .pill.nuevo{background:#fff;color:var(--green-dark);border:1px solid var(--green);}
  .teams{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .team{flex:1;font-size:14.5px;font-weight:600;min-width:0;}
  .team.pending{color:var(--muted);font-weight:500;font-style:italic;}
  .score{display:flex;align-items:center;gap:8px;}
  .scorebtn{width:46px;height:42px;text-align:center;border:1.5px solid var(--green);background:var(--green-light);border-radius:10px;font-size:17px;font-weight:800;color:var(--green-dark);cursor:pointer;}
  .scorebtn:active{background:var(--green);color:#fff;}
  .scorebtn[disabled]{border-color:var(--border);background:#f0f2f0;color:var(--muted);cursor:not-allowed;}
  .vs{color:var(--muted);font-size:12px;padding:0 2px;}
  .status-tag{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic;}
  .status-tag.played{color:var(--green);font-style:normal;font-weight:600;}
  table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
  th,td{padding:9px 10px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--border);}
  th{background:var(--green-light);color:var(--green-dark);font-size:11.5px;text-transform:uppercase;}
  tr:last-child td{border-bottom:none;}
  .pos1{color:var(--green-dark);font-weight:800;}
  .pos2{color:var(--green);font-weight:700;}
  .tag-new{font-size:10px;background:var(--green-light);color:var(--green-dark);border:1px solid var(--green);padding:1px 6px;border-radius:6px;margin-left:6px;}
  .group-block{margin-bottom:22px;}
  .helper{background:var(--green-light);border:1px dashed var(--green);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--green-dark);margin-bottom:16px;line-height:1.6;}
  .helper code{background:#fff;padding:1px 5px;border-radius:5px;}
  .players-summary{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .players-summary .box{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center;}
  .players-summary .box b{font-size:18px;color:var(--green-dark);display:block;}
  .players-summary .box span{font-size:11px;color:var(--muted);}
  .player-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);}
  .player-row:last-child{border-bottom:none;}
  .player-row .name{flex:1;font-size:14px;}
  .player-row .name small{display:block;color:var(--muted);font-size:11px;}
  .check{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);font-weight:600;}
  .check input{width:18px;height:18px;}
  .group-header-row{background:var(--green-dark);color:#fff;font-size:12.5px;font-weight:700;padding:7px 10px;border-radius:8px;margin:14px 0 4px;}
  .btn{background:var(--green);color:#fff;border:none;padding:9px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;}
  .toolbar{display:flex;justify-content:flex-end;margin-bottom:10px;}
  /* Keypad modal */
  .overlay{position:fixed;inset:0;background:rgba(15,30,20,.55);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .keypad{background:#fff;width:100%;max-width:380px;border-radius:20px 20px 0 0;padding:16px;box-shadow:0 -8px 30px rgba(0,0,0,.25);}
  @media (min-width:480px){ .overlay{align-items:center;} .keypad{border-radius:20px;} }
  .keypad-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .keypad-header span{font-size:14px;font-weight:700;color:var(--green-dark);}
  .kp-close{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;}
  .keypad-display{font-size:40px;font-weight:800;text-align:center;background:var(--green-light);border-radius:12px;padding:10px;margin-bottom:14px;color:var(--green-dark);}
  .keypad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
  .keypad-grid button{font-size:22px;font-weight:700;padding:16px 0;border:1px solid var(--border);background:#f7fbf8;border-radius:12px;color:var(--ink);cursor:pointer;}
  .keypad-grid button:active{background:var(--green-light);}
  .kp-clear{grid-column:span 1;color:var(--final)!important;}
  .kp-save{width:100%;background:var(--green);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;}
  @media print{
    header,nav,.toolbar,.helper,.overlay{display:none!important;}
    body{background:#fff;}
  }
</style>
</head>
<body>

<header>
  <h1>🎾 Torneo Ley Seca</h1>
  <div class="sub"><span>El Club Espinal</span><span>·</span><span>Suma 13 Mixto</span><span>·</span><span>17 parejas</span></div>
  <div class="status" id="fbStatus">Conectando a Firebase…</div>
</header>

<nav>
  <button data-tab="calendario" class="active">Calendario</button>
  <button data-tab="grupos">Grupos</button>
  <button data-tab="final">Fase Final</button>
  <button data-tab="jugadores">Jugadores</button>
</nav>

<main>
  <div class="stats">
    <div class="stat"><b>35</b><span>Partidos</span></div>
    <div class="stat"><b id="statJugados">0</b><span>Jugados</span></div>
    <div class="stat"><b>17</b><span>Parejas</span></div>
    <div class="stat"><b>34</b><span>Jugadores</span></div>
  </div>

  <div id="tab-calendario"></div>
  <div id="tab-grupos" style="display:none"></div>
  <div id="tab-final" style="display:none"></div>
  <div id="tab-jugadores" style="display:none"></div>
</main>

<!-- Teclado numérico para marcar resultados -->
<div class="overlay" id="keypadOverlay" onclick="closeKeypadOutside(event)">
  <div class="keypad" onclick="event.stopPropagation()">
    <div class="keypad-header"><span id="keypadTitle">Marcador</span><button class="kp-close" onclick="closeKeypad()">✕</button></div>
    <div class="keypad-display" id="keypadDisplay">0</div>
    <div class="keypad-grid">
      <button onclick="kpDigit('1')">1</button><button onclick="kpDigit('2')">2</button><button onclick="kpDigit('3')">3</button>
      <button onclick="kpDigit('4')">4</button><button onclick="kpDigit('5')">5</button><button onclick="kpDigit('6')">6</button>
      <button onclick="kpDigit('7')">7</button><button onclick="kpDigit('8')">8</button><button onclick="kpDigit('9')">9</button>
      <button class="kp-clear" onclick="kpClear()">⌫</button><button onclick="kpDigit('0')">0</button><button onclick="kpClear(true)">C</button>
    </div>
    <button class="kp-save" onclick="kpSave()">Guardar</button>
  </div>
</div>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ====================== CONFIGURA AQUÍ TU FIREBASE ======================
   Reemplaza estos valores con los de tu proyecto (el mismo que usas para
   los otros torneos, o uno nuevo). Realtime Database > reglas: read/write true
   mientras dure el torneo. ESTE BLOQUE NO BORRA TUS DATOS: los datos viven
   en Firebase, no en este archivo. Puedes editar el archivo y resubirlo
   sin perder lo que ya guardaste, siempre que mantengas el mismo proyecto
   de Firebase y los mismos IDs de partido (m1..m28, f1..f7).
*/
const firebaseConfig = {
  apiKey: "AIzaSyAl3mtoAILvDECAF5XtYg2alPnNSP66Ri8",
  authDomain: "torneo-ley.firebaseapp.com",
  databaseURL: "https://torneo-ley-default-rtdb.firebaseio.com",
  projectId: "torneo-ley",
  storageBucket: "torneo-ley.firebasestorage.app",
  messagingSenderId: "202554467520",
  appId: "1:202554467520:web:2a98f0aa70db5eb6e9b925",
};
/* ========================================================================= */

let db = null, dbReady = false;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  dbReady = true;
}catch(e){ dbReady = false; }

const ROOT = 'torneoLeySeca';

// ---------- DATOS ----------
const TEAMS = {
  a1:{group:'A', p:['Andrés Cabezas','Juanpi Alfonso']},
  a2:{group:'A', p:['Carlos Gordillo','Jhoan Morales']},
  a3:{group:'A', p:['Simón Ramírez','Sebastián Segura']},
  a4:{group:'A', p:['Steven Vega','Julián Mogollón']},
  b1:{group:'B', p:['Andrés Castro','Junior Vásquez']},
  b2:{group:'B', p:['Sebastián Luna','Carlos Andrade']},
  b3:{group:'B', p:['Andrés Alvarado','Luyeiro Barragán']},
  b4:{group:'B', p:['Hemerson Lazo','Natalia Barrios']},
  c1:{group:'C', p:['Carlos Molano','Sebastián Suárez']},
  c2:{group:'C', p:['Camilo Padilla','Johnny Villalobos']},
  c3:{group:'C', p:['Juanca Barrero','Julián Quimbayo']},
  c4:{group:'C', p:['Alejandra Sarmiento','Juan Rodríguez']},
  d1:{group:'D', p:['Paola Hernández','Carlos Rodríguez']},
  d2:{group:'D', p:['Alejandro Zuluaga','Juan Guapacho']},
  d3:{group:'D', p:['Jean García','Nicolás Rojas']},
  d4:{group:'D', p:['Matías Archila','Santiago Nieto']},
  d5:{group:'D', p:['Omar','Felipe M.'], nuevo:true},
};
function teamName(id){ return TEAMS[id] ? TEAMS[id].p.join(' & ') : 'Por definir'; }

// id, time, court, group, phase, t1, t2, isNew
const MATCHES = [
  // GRUPO A
  {id:'m1', time:'16:00', court:'PIJAOS', group:'A', phase:'grupos', t1:'a1', t2:'a2'},
  {id:'m2', time:'16:00', court:'EL CLUB', group:'A', phase:'grupos', t1:'a3', t2:'a4'},
  {id:'m3', time:'16:20', court:'PIJAOS', group:'A', phase:'grupos', t1:'a4', t2:'a1'},
  {id:'m4', time:'16:20', court:'EL CLUB', group:'A', phase:'grupos', t1:'a2', t2:'a3'},
  {id:'m5', time:'16:40', court:'EL CLUB', group:'A', phase:'grupos', t1:'a4', t2:'a2'},
  {id:'m6', time:'16:40', court:'PIJAOS', group:'A', phase:'grupos', t1:'a3', t2:'a1'},
  // GRUPO B
  {id:'m7', time:'17:00', court:'PIJAOS', group:'B', phase:'grupos', t1:'b4', t2:'b2'},
  {id:'m8', time:'17:00', court:'EL CLUB', group:'B', phase:'grupos', t1:'b3', t2:'b1'},
  {id:'m9', time:'17:20', court:'PIJAOS', group:'B', phase:'grupos', t1:'b4', t2:'b1'},
  {id:'m10', time:'17:20', court:'EL CLUB', group:'B', phase:'grupos', t1:'b2', t2:'b3'},
  {id:'m11', time:'17:40', court:'EL CLUB', group:'B', phase:'grupos', t1:'b1', t2:'b2'},
  {id:'m12', time:'17:40', court:'PIJAOS', group:'B', phase:'grupos', t1:'b3', t2:'b4'},
  // GRUPO C
  {id:'m13', time:'18:00', court:'PIJAOS', group:'C', phase:'grupos', t1:'c3', t2:'c1'},
  {id:'m14', time:'18:00', court:'EL CLUB', group:'C', phase:'grupos', t1:'c4', t2:'c2'},
  {id:'m15', time:'18:20', court:'PIJAOS', group:'C', phase:'grupos', t1:'c4', t2:'c1'},
  {id:'m16', time:'18:20', court:'EL CLUB', group:'C', phase:'grupos', t1:'c2', t2:'c3'},
  {id:'m17', time:'18:40', court:'PIJAOS', group:'C', phase:'grupos', t1:'c1', t2:'c2'},
  {id:'m18', time:'18:40', court:'EL CLUB', group:'C', phase:'grupos', t1:'c3', t2:'c4'},
  // GRUPO D (original)
  {id:'m19', time:'19:00', court:'PIJAOS', group:'D', phase:'grupos', t1:'d2', t2:'d3'},
  {id:'m20', time:'19:00', court:'EL CLUB', group:'D', phase:'grupos', t1:'d4', t2:'d1'},
  {id:'m21', time:'19:20', court:'EL CLUB', group:'D', phase:'grupos', t1:'d1', t2:'d2'},
  {id:'m22', time:'19:20', court:'PIJAOS', group:'D', phase:'grupos', t1:'d3', t2:'d4'},
  {id:'m23', time:'19:40', court:'EL CLUB', group:'D', phase:'grupos', t1:'d3', t2:'d1'},
  {id:'m24', time:'19:40', court:'PIJAOS', group:'D', phase:'grupos', t1:'d4', t2:'d2'},
  // GRUPO D — NUEVOS por Omar/Felipe M.
  {id:'m25', time:'20:00', court:'PIJAOS', group:'D', phase:'grupos', t1:'d5', t2:'d1', isNew:true},
  {id:'m26', time:'20:00', court:'EL CLUB', group:'D', phase:'grupos', t1:'d5', t2:'d2', isNew:true},
  {id:'m27', time:'20:20', court:'PIJAOS', group:'D', phase:'grupos', t1:'d5', t2:'d3', isNew:true},
  {id:'m28', time:'20:20', court:'EL CLUB', group:'D', phase:'grupos', t1:'d5', t2:'d4', isNew:true},
  // FASE FINAL — automática según puntos del grupo. Horario desplazado 40 min.
  {id:'f1', time:'20:40', court:'EL CLUB', group:'-', phase:'cuartos'},
  {id:'f2', time:'20:40', court:'PIJAOS', group:'-', phase:'cuartos'},
  {id:'f3', time:'21:00', court:'EL CLUB', group:'-', phase:'cuartos'},
  {id:'f4', time:'21:00', court:'PIJAOS', group:'-', phase:'cuartos'},
  {id:'f5', time:'21:20', court:'EL CLUB', group:'-', phase:'semis'},
  {id:'f6', time:'21:20', court:'PIJAOS', group:'-', phase:'semis'},
  {id:'f7', time:'21:40', court:'PIJAOS', group:'-', phase:'final'},
];
const SCORES = {}; // matchId -> {score1, score2}

const PLAYERS = [];
Object.keys(TEAMS).forEach(tid=>{
  TEAMS[tid].p.forEach((name,i)=>{
    PLAYERS.push({id: tid+'_'+i, name, team: tid, group: TEAMS[tid].group, nuevo: !!TEAMS[tid].nuevo});
  });
});
const PSTATE = {}; // playerId -> {paid,food}

// ---------- FIREBASE SYNC ----------
const fbStatusEl = document.getElementById('fbStatus');
if(dbReady){
  fbStatusEl.textContent = 'Sincronizando en vivo con Firebase ✓ — tus datos quedan guardados ahí';
  fbStatusEl.className = 'status ok';
  db.ref(ROOT+'/scores').on('value', snap=>{
    Object.assign(SCORES, snap.val()||{});
    renderAll();
  });
  db.ref(ROOT+'/players').on('value', snap=>{
    Object.assign(PSTATE, snap.val()||{});
    renderAll();
  });
} else {
  fbStatusEl.textContent = 'Sin conexión a Firebase — completa firebaseConfig en el código para guardar los datos';
  fbStatusEl.className = 'status bad';
}

function saveScore(id, score1, score2){
  SCORES[id] = {score1, score2};
  if(dbReady) db.ref(ROOT+'/scores/'+id).set({score1, score2});
  renderAll();
}
function savePlayer(id, field, value){
  PSTATE[id] = Object.assign({}, PSTATE[id], {[field]: value});
  if(dbReady) db.ref(ROOT+'/players/'+id).update({[field]: value});
  renderAll();
}

// ---------- TABS ----------
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['calendario','grupos','final','jugadores'].forEach(t=>{
      document.getElementById('tab-'+t).style.display = (t===btn.dataset.tab)?'block':'none';
    });
  });
});

// ---------- LÓGICA DE RESULTADOS Y CLASIFICACIÓN ----------
function hasScore(sc){
  return sc && sc.score1!=='' && sc.score1!==undefined && sc.score1!==null &&
         sc.score2!=='' && sc.score2!==undefined && sc.score2!==null;
}
function standings(groupLetter){
  const teams = Object.keys(TEAMS).filter(t=>TEAMS[t].group===groupLetter);
  const data = teams.map(tid=>{
    let pj=0, pts=0;
    MATCHES.filter(m=>m.phase==='grupos' && m.group===groupLetter && (m.t1===tid||m.t2===tid)).forEach(m=>{
      const sc = SCORES[m.id];
      if(hasScore(sc)){
        pj++;
        pts += Number(m.t1===tid ? sc.score1 : sc.score2);
      }
    });
    return {tid, pj, pts};
  });
  data.sort((a,b)=> b.pts-a.pts || b.pj-a.pj || teamName(a.tid).localeCompare(teamName(b.tid)));
  return data;
}
function groupComplete(g){
  return MATCHES.filter(m=>m.phase==='grupos'&&m.group===g).every(m=>hasScore(SCORES[m.id]));
}
function winnerOf(t1,t2,scId){
  if(!t1||!t2) return null;
  const sc = SCORES[scId];
  if(!hasScore(sc)) return null;
  const s1=Number(sc.score1), s2=Number(sc.score2);
  if(s1===s2) return null;
  return s1>s2 ? t1 : t2;
}
// Cuartos: QF1=1A-2B · QF2=1C-2D · QF3=1B-2A · QF4=1D-2C
function computeFinalTeams(){
  const top = g => groupComplete(g) ? (standings(g)[0]||{}).tid || null : null;
  const sec = g => groupComplete(g) ? (standings(g)[1]||{}).tid || null : null;
  const f = {};
  f.f1 = {t1: top('A'), t2: sec('B'), label:'QF1'};
  f.f2 = {t1: top('C'), t2: sec('D'), label:'QF2'};
  f.f3 = {t1: top('B'), t2: sec('A'), label:'QF3'};
  f.f4 = {t1: top('D'), t2: sec('C'), label:'QF4'};
  f.f5 = {t1: winnerOf(f.f1.t1,f.f1.t2,'f1'), t2: winnerOf(f.f2.t1,f.f2.t2,'f2'), label:'SF1'};
  f.f6 = {t1: winnerOf(f.f3.t1,f.f3.t2,'f3'), t2: winnerOf(f.f4.t1,f.f4.t2,'f4'), label:'SF2'};
  f.f7 = {t1: winnerOf(f.f5.t1,f.f5.t2,'f5'), t2: winnerOf(f.f6.t1,f.f6.t2,'f6'), label:'FINAL'};
  return f;
}
function getMatchTeams(matchId){
  const m = MATCHES.find(x=>x.id===matchId);
  if(m.phase==='grupos') return {t1:m.t1, t2:m.t2};
  return computeFinalTeams()[matchId];
}

// ---------- TECLADO NUMÉRICO ----------
let kpMatchId=null, kpSlot=null, kpValue='';
function openKeypad(matchId, slot){
  const {t1,t2} = getMatchTeams(matchId);
  const tid = slot===1?t1:t2;
  if(!tid) return;
  kpMatchId=matchId; kpSlot=slot;
  const sc = SCORES[matchId]||{};
  kpValue = String(slot===1 ? (sc.score1??'') : (sc.score2??''));
  if(kpValue==='undefined'||kpValue==='null') kpValue='';
  document.getElementById('keypadTitle').textContent = teamName(tid);
  updateKeypadDisplay();
  document.getElementById('keypadOverlay').style.display='flex';
}
function updateKeypadDisplay(){ document.getElementById('keypadDisplay').textContent = kpValue===''?'0':kpValue; }
function kpDigit(d){ if(kpValue.length>=2) return; kpValue = (kpValue==='0'?'':kpValue) + d; updateKeypadDisplay(); }
function kpClear(all){ kpValue = all ? '' : kpValue.slice(0,-1); updateKeypadDisplay(); }
function closeKeypad(){ document.getElementById('keypadOverlay').style.display='none'; kpMatchId=null; kpSlot=null; kpValue=''; }
function closeKeypadOutside(e){ if(e.target.id==='keypadOverlay') closeKeypad(); }
function kpSave(){
  if(!kpMatchId) return;
  const sc = SCORES[kpMatchId] || {};
  const val = kpValue;
  if(kpSlot===1) saveScore(kpMatchId, val, sc.score2 ?? '');
  else saveScore(kpMatchId, sc.score1 ?? '', val);
  closeKeypad();
}

// ---------- RENDER ----------
function phaseLabel(p){
  return {grupos:'Fase de grupos', cuartos:'Cuartos de final', semis:'Semifinal', final:'Final'}[p];
}
function matchCard(m){
  const sc = SCORES[m.id] || {};
  const played = hasScore(sc);
  let t1 = m.t1, t2 = m.t2, badgeText, pending=false;
  if(m.phase==='grupos'){
    badgeText = 'Grupo '+m.group;
  } else {
    const ft = computeFinalTeams()[m.id];
    t1 = ft.t1; t2 = ft.t2;
    badgeText = ft.label+' · '+phaseLabel(m.phase);
    pending = !t1 || !t2;
  }
  const team1Html = t1 ? teamName(t1) : 'Pendiente clasificación';
  const team2Html = t2 ? teamName(t2) : 'Pendiente clasificación';
  return `
  <div class="card ${m.isNew?'new':''} ${pending?'pending':''}">
    <div class="row-top">
      <span class="pill time">${m.time}</span>
      <span class="pill court">${m.court}</span>
      <span class="pill ${m.phase}">${badgeText}</span>
      ${m.isNew?'<span class="pill nuevo">★ Nuevo — Omar/Felipe M.</span>':''}
    </div>
    <div class="teams">
      <div class="team ${!t1?'pending':''}">${team1Html}</div>
      <div class="score">
        <button class="scorebtn" ${!t1||!t2?'disabled':''} onclick="openKeypad('${m.id}',1)">${sc.score1??'–'}</button>
        <span class="vs">-</span>
        <button class="scorebtn" ${!t1||!t2?'disabled':''} onclick="openKeypad('${m.id}',2)">${sc.score2??'–'}</button>
      </div>
      <div class="team ${!t2?'pending':''}" style="text-align:right">${team2Html}</div>
    </div>
    <div class="status-tag ${played?'played':''}">${played?'✓ Jugado':(pending?'Esperando clasificación':'Por jugar')}</div>
  </div>`;
}

function renderCalendario(){
  const grupos = MATCHES.filter(m=>m.phase==='grupos');
  const finalM = MATCHES.filter(m=>m.phase!=='grupos');
  let html = `<h2 class="section"><span class="bar"></span>Fase de grupos (28 partidos)</h2>`;
  let lastTime = null;
  grupos.forEach(m=>{
    if(m.time!==lastTime){ html += `<div class="day">⏱ ${m.time}</div>`; lastTime=m.time; }
    html += matchCard(m);
  });
  html += `<h2 class="section"><span class="bar"></span>Fase final (7 partidos)</h2>`;
  lastTime = null;
  finalM.forEach(m=>{
    if(m.time!==lastTime){ html += `<div class="day">⏱ ${m.time}</div>`; lastTime=m.time; }
    html += matchCard(m);
  });
  document.getElementById('tab-calendario').innerHTML = html;
}

function renderGrupos(){
  let html = '';
  ['A','B','C','D'].forEach(g=>{
    const data = standings(g);
    html += `<div class="group-block"><div class="group-header-row">Grupo ${g} — ${g==='D'?'5':'4'} equipos</div>
    <table><tr><th>#</th><th>Pareja</th><th>PJ</th><th>PTS</th></tr>`;
    data.forEach((row,i)=>{
      const t = TEAMS[row.tid];
      html += `<tr><td class="${i===0?'pos1':i===1?'pos2':''}">${i+1}</td>
      <td>${teamName(row.tid)} ${t.nuevo?'<span class="tag-new">NUEVO</span>':''}</td>
      <td>${row.pj}</td><td>${row.pts}</td></tr>`;
    });
    html += `</table></div>`;
  });
  document.getElementById('tab-grupos').innerHTML = html;
}

function renderFinal(){
  const finalM = MATCHES.filter(m=>m.phase!=='grupos');
  let lastPhase = null;
  let html = `<div class="helper"><b>Fórmula del cuadro (automática):</b><br>
    <code>QF1</code> = 1°A vs 2°B &nbsp; <code>QF2</code> = 1°C vs 2°D<br>
    <code>QF3</code> = 1°B vs 2°A &nbsp; <code>QF4</code> = 1°D vs 2°C<br>
    <code>SF1</code> = ganador QF1 vs ganador QF2 &nbsp; <code>SF2</code> = ganador QF3 vs ganador QF4<br>
    <code>FINAL</code> = ganador SF1 vs ganador SF2<br>
    Las parejas se completan solas en cuanto termina cada grupo o partido.</div>`;
  finalM.forEach(m=>{
    if(m.phase!==lastPhase){ html += `<h2 class="section"><span class="bar"></span>${phaseLabel(m.phase)}</h2>`; lastPhase=m.phase; }
    html += matchCard(m);
  });
  document.getElementById('tab-final').innerHTML = html;
}

function renderJugadores(){
  const paidCount = PLAYERS.filter(p=>PSTATE[p.id]&&PSTATE[p.id].paid).length;
  const foodCount = PLAYERS.filter(p=>PSTATE[p.id]&&PSTATE[p.id].food).length;
  let html = `<div class="toolbar"><button class="btn" onclick="window.print()">🖨 Imprimir lista</button></div>`;
  html += `<div class="players-summary">
    <div class="box"><b>${paidCount}/34</b><span>Pagaron</span></div>
    <div class="box"><b>${foodCount}/34</b><span>Recibieron comida</span></div>
  </div>`;
  ['A','B','C','D'].forEach(g=>{
    html += `<div class="group-header-row">Grupo ${g}</div>`;
    PLAYERS.filter(p=>p.group===g).forEach(p=>{
      const st = PSTATE[p.id] || {};
      html += `<div class="player-row">
        <div class="name">${p.name} ${p.nuevo?'<span class="tag-new">NUEVO</span>':''}<small>${teamName(p.team)}</small></div>
        <label class="check"><input type="checkbox" ${st.paid?'checked':''} onchange="savePlayer('${p.id}','paid', this.checked)"> Pagó</label>
        <label class="check"><input type="checkbox" ${st.food?'checked':''} onchange="savePlayer('${p.id}','food', this.checked)"> Comida</label>
      </div>`;
    });
  });
  document.getElementById('tab-jugadores').innerHTML = html;
}

function renderAll(){
  renderCalendario();
  renderGrupos();
  renderFinal();
  renderJugadores();
  const jugados = MATCHES.filter(m=>hasScore(SCORES[m.id])).length;
  document.getElementById('statJugados').textContent = jugados;
}

renderAll();
</script>
</body>
</html>
